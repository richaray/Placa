<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Placa — Your Plant Care Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --sage:        #7a9e7e;
      --sage-light:  #a8c5a0;
      --sage-pale:   #d4e8d0;
      --sage-mist:   #eef5ec;
      --forest:      #3a5c3e;
      --forest-deep: #243b27;
      --cream:       #faf8f4;
      --warm-white:  #ffffff;
      --petal:       #e8f2e5;
      --text-dark:   #1e2d20;
      --text-mid:    #4a6b4e;
      --text-soft:   #7a9e7e;
      --radius-sm:   10px;
      --radius-md:   18px;
      --radius-lg:   28px;
      --radius-xl:   40px;
      --shadow-card: 0 4px 24px rgba(58,92,62,0.10), 0 1px 4px rgba(58,92,62,0.06);
      --shadow-float:0 8px 40px rgba(58,92,62,0.16), 0 2px 8px rgba(58,92,62,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -120px; right: -120px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, #b8d9b0 0%, transparent 70%);
      opacity: 0.45;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; left: -80px;
      width: 420px; height: 420px;
      background: radial-gradient(circle, #c9e0c0 0%, transparent 70%);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    .leaf-deco {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0.07;
    }
    .leaf-deco.tl { top: 60px; left: 20px; transform: rotate(-30deg); }
    .leaf-deco.br { bottom: 80px; right: 20px; transform: rotate(150deg); }
    .leaf-deco svg { width: 130px; height: 130px; fill: var(--forest); }

    .page-wrap {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s ease both;
    }
    .logo-leaf {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 68px; height: 68px;
      background: linear-gradient(135deg, var(--sage-light), var(--forest));
      border-radius: 50%;
      margin-bottom: 1rem;
      box-shadow: 0 4px 20px rgba(58,92,62,0.25);
    }
    .logo-leaf svg { width: 36px; height: 36px; }

    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2.4rem, 6vw, 3.2rem);
      font-weight: 400;
      color: var(--forest-deep);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    h1 em { font-style: italic; color: var(--sage); }

    .tagline {
      margin-top: 0.6rem;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--text-mid);
      letter-spacing: 0.02em;
    }

    /* ── Cards ── */
    .card {
      background: var(--warm-white);
      border-radius: var(--radius-lg);
      padding: 1.6rem 1.8rem;
      box-shadow: var(--shadow-card);
      margin-bottom: 1.25rem;
      animation: fadeUp 0.6s ease both;
      animation-delay: 0.1s;
      animation-fill-mode: both;
    }

    .card-label {
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.11em;
      color: var(--text-soft);
      margin-bottom: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-label svg { width: 13px; height: 13px; opacity: 0.75; }

    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed var(--sage-pale);
      border-radius: var(--radius-md);
      padding: 2.8rem 1.5rem;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
      background: var(--sage-mist);
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--sage);
      background: var(--petal);
    }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }
    .upload-icon-wrap {
      width: 58px; height: 58px;
      background: linear-gradient(135deg, var(--sage-pale), var(--petal));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .upload-icon-wrap svg { width: 26px; height: 26px; color: var(--sage); }
    .upload-title {
      font-family: 'Fraunces', serif;
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--forest);
      margin-bottom: 0.3rem;
    }
    .upload-sub { font-size: 0.82rem; color: var(--text-soft); font-weight: 300; }

    /* ── Preview ── */
    .preview-card {
      position: relative;
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .preview-card img {
      width: 100%; max-height: 320px;
      object-fit: cover; display: block;
    }
    .preview-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(36,59,39,0.55) 0%, transparent 55%);
    }
    .preview-actions {
      position: absolute;
      bottom: 1rem; left: 1rem; right: 1rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .preview-badge {
      background: rgba(255,255,255,0.92);
      color: var(--forest);
      font-size: 0.78rem; font-weight: 500;
      padding: 5px 13px; border-radius: 50px;
      backdrop-filter: blur(4px);
    }
    .btn-change {
      background: rgba(255,255,255,0.92);
      border: none; color: var(--forest);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; font-weight: 500;
      padding: 6px 14px; border-radius: 50px;
      cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }
    .btn-change:hover { background: #fff; }
    .btn-change svg { width: 13px; height: 13px; }

    /* ── Analyse button ── */
    .btn-analyze {
      width: 100%; margin-top: 1.25rem;
      padding: 1rem 1.5rem;
      background: linear-gradient(135deg, var(--sage) 0%, var(--forest) 100%);
      color: white;
      font-family: 'Fraunces', serif;
      font-size: 1.08rem; font-weight: 400; font-style: italic;
      border: none; border-radius: var(--radius-xl);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 4px 20px rgba(58,92,62,0.30);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      letter-spacing: 0.01em;
    }
    .btn-analyze:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(58,92,62,0.35);
    }
    .btn-analyze:active:not(:disabled) { transform: translateY(0); }
    .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-analyze svg { width: 20px; height: 20px; }

    /* ── Loading dots ── */
    .dots { display: inline-flex; gap: 4px; align-items: center; }
    .dots span {
      width: 5px; height: 5px;
      background: white; border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Error ── */
    .error-box {
      background: #fff3f3;
      border: 1.5px solid #f5b8b8;
      color: #8b2020;
      border-radius: var(--radius-md);
      padding: 0.85rem 1rem;
      font-size: 0.88rem;
      margin-top: 1rem;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .error-box svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

    /* ── Results ── */
    .results-wrap { margin-top: 1.5rem; animation: fadeUp 0.5s ease both; }

    .plant-name-badge {
      display: block;
      background: linear-gradient(135deg, var(--sage-pale), var(--petal));
      color: var(--forest-deep);
      font-family: 'Fraunces', serif;
      font-size: 1.45rem; font-weight: 400; font-style: italic;
      padding: 0.65rem 1.35rem;
      border-radius: var(--radius-xl);
      border: 1.5px solid var(--sage-pale);
      margin-bottom: 1.25rem;
    }

    .care-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 480px) { .care-grid { grid-template-columns: 1fr; } }

    .care-card {
      background: var(--warm-white);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      box-shadow: var(--shadow-card);
      border: 1.5px solid transparent;
      transition: border-color 0.2s, transform 0.2s;
    }
    .care-card:hover { border-color: var(--sage-pale); transform: translateY(-2px); }
    .care-card.full-width { grid-column: 1 / -1; }

    .care-icon {
      width: 42px; height: 42px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 0.75rem;
      font-size: 1.4rem;
    }
    .care-icon.water  { background: #e0f0ff; }
    .care-icon.sun    { background: #fff8e0; }
    .care-icon.soil   { background: #f5ede0; }
    .care-icon.tip    { background: var(--sage-mist); }
    .care-icon.fact   { background: #f0e8f5; }

    .care-card-label {
      font-size: 0.69rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-soft); margin-bottom: 0.35rem;
    }
    .care-card-content {
      font-size: 0.91rem; color: var(--text-dark);
      line-height: 1.68; font-weight: 300;
    }

    .raw-card {
      background: var(--warm-white);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      box-shadow: var(--shadow-card);
    }
    .raw-card-label {
      font-size: 0.69rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-soft); margin-bottom: 0.75rem;
    }
    .raw-card-body {
      font-size: 0.91rem; line-height: 1.78;
      color: var(--text-dark); font-weight: 300;
      white-space: pre-wrap;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.78rem;
      color: var(--text-soft);
      font-weight: 300;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="leaf-deco tl" aria-hidden="true">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 5 C20 20, 5 50, 10 80 C20 95, 45 95, 60 80 C80 60, 85 30, 50 5 Z"/>
      <line x1="50" y1="5" x2="50" y2="82" stroke="currentColor" stroke-width="3"/>
    </svg>
  </div>
  <div class="leaf-deco br" aria-hidden="true">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 5 C20 20, 5 50, 10 80 C20 95, 45 95, 60 80 C80 60, 85 30, 50 5 Z"/>
    </svg>
  </div>

  <div class="page-wrap">

    <header>
      <div class="logo-leaf" aria-hidden="true">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 4 C9 10, 5 21, 8 29 C11 35, 19 35, 23 29 C29 21, 27 10, 18 4 Z" fill="white" opacity="0.92"/>
          <path d="M18 5 L18 31" stroke="rgba(58,92,62,0.4)" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M18 19 L12 13" stroke="rgba(58,92,62,0.3)" stroke-width="1.1" stroke-linecap="round"/>
          <path d="M18 24 L24 18" stroke="rgba(58,92,62,0.3)" stroke-width="1.1" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>Pl<em>a</em>ca</h1>
      <p class="tagline">Upload your plant · get personalised care tips</p>
    </header>

    <!-- Upload card -->
    <div class="card">
      <div class="card-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Your Plant
      </div>

      <div class="upload-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*" />
        <div class="upload-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
        </div>
        <p class="upload-title">Drop a photo here</p>
        <p class="upload-sub">or click to browse · JPG, PNG, WEBP</p>
      </div>

      <div id="previewWrap" style="display:none; margin-top:1rem;">
        <div class="preview-card">
          <img id="previewImg" src="" alt="Your plant" />
          <div class="preview-overlay"></div>
          <div class="preview-actions">
            <span class="preview-badge">Ready to analyse</span>
            <button class="btn-change" id="changeBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
              Change
            </button>
          </div>
        </div>
      </div>

      <button class="btn-analyze" id="analyzeBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span id="analyzeBtnText">Identify my plant</span>
      </button>

      <div id="errorBox" class="error-box" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorText"></span>
      </div>
    </div>

    <!-- Results -->
    <div id="resultsWrap" class="results-wrap" style="display:none;"></div>

    <footer>Made with 🌿 by <strong>Placa</strong></footer>
  </div>

<script>
(function () {
  const fileInput   = document.getElementById('fileInput');
  const dropZone    = document.getElementById('dropZone');
  const previewWrap = document.getElementById('previewWrap');
  const previewImg  = document.getElementById('previewImg');
  const changeBtn   = document.getElementById('changeBtn');
  const analyzeBtn  = document.getElementById('analyzeBtn');
  const btnText     = document.getElementById('analyzeBtnText');
  const resultsWrap = document.getElementById('resultsWrap');
  const errorBox    = document.getElementById('errorBox');
  const errorText   = document.getElementById('errorText');

  let base64Data = '';
  let mimeType   = '';

  function toBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload  = () => res(r.result.split(',')[1]);
      r.onerror = () => rej(new Error('Could not read file'));
      r.readAsDataURL(file);
    });
  }

  function showPreview(file) {
    previewImg.src = URL.createObjectURL(file);
    dropZone.style.display = 'none';
    previewWrap.style.display = 'block';
    analyzeBtn.disabled = false;
    mimeType = file.type || 'image/jpeg';
    resultsWrap.style.display = 'none';
    hideError();
    toBase64(file).then(b64 => { base64Data = b64; });
  }

  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) showPreview(e.target.files[0]);
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) showPreview(e.dataTransfer.files[0]);
  });

  changeBtn.addEventListener('click', () => {
    dropZone.style.display = 'block';
    previewWrap.style.display = 'none';
    fileInput.value = '';
    base64Data = '';
    analyzeBtn.disabled = true;
    resultsWrap.style.display = 'none';
    hideError();
  });

  function showError(msg) { errorText.textContent = msg; errorBox.style.display = 'flex'; }
  function hideError()    { errorBox.style.display = 'none'; }

  function setLoading(on) {
    analyzeBtn.disabled = on;
    btnText.innerHTML = on
      ? 'Identifying <span class="dots"><span></span><span></span><span></span></span>'
      : 'Identify my plant';
  }

  /**
   * Parse the structured response from Gemini.
   * The prompt now enforces "KEY: value on one line" format.
   * We find each key at the start of a line (case-insensitive) and grab
   * everything after the colon — no regex label-matching inside content.
   */
  function parseResult(text) {
    function getField(key) {
      // ^KEY:\s*(.+)$  — anchored to line start, multiline, case-insensitive
      const m = text.match(new RegExp('^' + key + ':\\s*(.+)$', 'im'));
      if (!m) return null;
      return m[1].trim().replace(/\*\*/g, '').replace(/\*/g, '');
    }

    // Fallback plant name: first non-empty line stripped of leading numbers
    const fallbackName = text.split('\n')
      .map(l => l.trim())
      .find(l => l.length > 0) || '';

    return {
      plantName : getField('PLANT_NAME') || fallbackName.replace(/^\d+\.\s*/, ''),
      watering  : getField('WATERING'),
      light     : getField('LIGHT'),
      soil      : getField('SOIL_FERTILISER'),
      mistake   : getField('COMMON_MISTAKE'),
      fact      : getField('FUN_FACT'),
    };
  }

  function buildResults(text) {
    const { plantName, watering, light, soil, mistake, fact } = parseResult(text);

    const cards = [
      watering && { icon: '💧', cls: 'water', label: 'Watering',         content: watering },
      light    && { icon: '☀️', cls: 'sun',   label: 'Sunlight',         content: light    },
      soil     && { icon: '🌱', cls: 'soil',  label: 'Soil & Fertiliser', content: soil     },
      mistake  && { icon: '⚠️', cls: 'tip',   label: 'Common Mistake',   content: mistake  },
      fact     && { icon: '✨', cls: 'fact',  label: 'Fun Fact',          content: fact     },
    ].filter(Boolean);

    let html = `<div class="plant-name-badge">${plantName}</div>`;

    if (cards.length >= 2) {
      html += '<div class="care-grid">';
      cards.forEach((c, i) => {
        const full = (i === cards.length - 1 && cards.length % 2 !== 0) ? ' full-width' : '';
        html += `
          <div class="care-card${full}">
            <div class="care-icon ${c.cls}">${c.icon}</div>
            <div class="care-card-label">${c.label}</div>
            <div class="care-card-content">${c.content}</div>
          </div>`;
      });
      html += '</div>';
    } else {
      // Fallback: show raw response if structured parsing failed entirely
      const clean = text.replace(/\*\*/g, '').replace(/\*/g, '');
      html += `
        <div class="raw-card">
          <div class="raw-card-label">Care Guide</div>
          <div class="raw-card-body">${clean}</div>
        </div>`;
    }
    return html;
  }

  analyzeBtn.addEventListener('click', async () => {
    if (!base64Data) { showError('Please upload a plant photo first.'); return; }

    hideError();
    setLoading(true);
    resultsWrap.style.display = 'none';

    try {
      const res = await fetch('/.netlify/functions/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ imageData: base64Data, mimeType })
      });

      const data = await res.json();
      if (!res.ok) { showError(data.error || 'Something went wrong. Please try again.'); return; }

      const text = data.result || '';
      if (!text) { showError('No response received. Please try again.'); return; }

      resultsWrap.innerHTML = buildResults(text);
      resultsWrap.style.display = 'block';
      resultsWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (err) {
      showError('Network error: ' + err.message);
    } finally {
      setLoading(false);
    }
  });
})();
</script>
</body>
</html>
